<!DOCTYPE html>
<html lang="en">
<head>
<script>(function(){try{var t=localStorage.getItem('bitespot_theme')||'dark';document.documentElement.setAttribute('data-theme',t);}catch(e){}})();</script>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Restaurant Login</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,600;1,9..144,500&family=Manrope:wght@400;500;600;700;800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/admin/css/admin.css" />
</head>
<body>
<div class="auth-wrap">
  <div class="auth-card">
    <div class="auth-logo">Bite<span class="accent">Spot</span></div>
    <p class="auth-sub">Log in to your restaurant dashboard</p>

    <div class="form-error" id="formError"></div>

    <form id="loginForm">
      <div class="field">
        <label>Username</label>
        <input type="text" id="username" autocomplete="username" required />
      </div>
      <div class="field password-field">
  <label>Password</label>

  <div class="password-wrapper">
    <input
      type="password"
      id="password"
      autocomplete="current-password"
      required
    >

    <button
  type="button"
  class="toggle-password"
  aria-label="Show password">

  <svg class="icon-eye" xmlns="http://www.w3.org/2000/svg"
       width="20" height="20" viewBox="0 0 24 24"
       fill="none" stroke="currentColor"
       stroke-width="2" stroke-linecap="round"
       stroke-linejoin="round">
    <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8S1 12 1 12z"/>
    <circle cx="12" cy="12" r="3"/>
  </svg>

</button>
  </div>
</div>
      <button type="submit" class="btn btn-orange btn-full" id="submitBtn">Log In</button>
    </form>

    <p class="auth-switch">
  Need an account?
  <a href="https://wa.me/2349134744223?text=Hi%20BiteSpot!%20%F0%9F%91%8B%0A%0AI'm%20interested%20in%20getting%20a%20QR%20Menu%20%26%20Ordering%20System%20for%20my%20restaurant.%0A%0AI'd%20like%20to%20know%20more%20about%20pricing,%20setup,%20and%20how%20to%20get%20started." target="_blank" rel="noopener noreferrer">
    Contact the platform administrator
  </a>.
</p>
  </div>
</div>

<script src="/admin/js/admin-api.js"></script>
<script src="/admin/js/login.js"></script>
<script src="/shared/theme-toggle.js"></script>
</body>
</html>
