<!DOCTYPE html>
<html lang="en">
<head>
<script>(function(){try{var t=localStorage.getItem('bitespot_theme')||'dark';document.documentElement.setAttribute('data-theme',t);}catch(e){}})();</script>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Platform Admin — Restaurants</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,600;1,9..144,500&family=Manrope:wght@400;500;600;700;800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/admin/css/admin.css" />
</head>
<body>
<div class="admin-shell">
  <aside class="sidebar">
    <div class="sidebar-logo">Bite<span class="accent">Spot</span> <span style="font-size:11px;color:var(--cream-dim);font-family:var(--font-body);font-weight:700;display:block;margin-top:2px">PLATFORM ADMIN</span></div>
    <nav class="sidebar-nav">
      <a href="/super-admin/dashboard.html" class="active">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 21h18"/><path d="M5 21V7l8-4v18"/><path d="M19 21V11l-6-4"/></svg>
        Restaurants
      </a>
    </nav>
    <div class="sidebar-footer">
      <button class="btn btn-outline btn-full" id="logoutBtn">Log Out</button>
    </div>
  </aside>

  <div class="main-area">
    <header class="main-header">
      <h1>Restaurants</h1>
      <div id="headerName" style="font-size:14px;color:var(--cream-dim);font-weight:600"></div>
    </header>
    <main class="main-content" id="mainContent">

      <div class="stat-grid" id="statGrid">
        <div class="stat-card orange"><div class="label">Total Restaurants</div><div class="value" id="statTotal">—</div></div>
        <div class="stat-card"><div class="label">Active</div><div class="value" id="statActive">—</div></div>
        <div class="stat-card"><div class="label">Suspended</div><div class="value" id="statSuspended">—</div></div>
      </div>

      <div class="panel">
        <div class="panel-header">
          <h2>All Tenants</h2>
          <button class="btn btn-orange" id="addRestaurantBtn" style="padding:9px 16px;font-size:13.5px">+ Create Restaurant</button>
        </div>
        <div class="panel-body" id="restaurantsBody">
          <div class="empty-state" style="padding:20px">Loading…</div>
        </div>
      </div>

    </main>
  </div>
</div>

<div id="modalRoot"></div>

<script src="/super-admin/js/super-admin-api.js"></script>
<script src="/super-admin/js/dashboard.js"></script>
<script src="/shared/theme-toggle.js"></script>
</body>
</html>
