<!DOCTYPE html>
<html lang="en">
<head>
<script>
(function () {
  try {
    var t = localStorage.getItem('bitespot_theme') || 'dark';
    document.documentElement.setAttribute('data-theme', t);
  } catch (e) {}
})();
</script>

<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />

<title>Platform Admin Login</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,600;1,9..144,500&family=Manrope:wght@400;500;600;700;800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">

<link rel="stylesheet" href="../admin/css/admin.css" />
</head>

<body>

<div class="auth-wrap">
  <div class="auth-card">

    <div class="auth-logo">
      Bite<span class="accent">Spot</span>
    </div>

    <p class="auth-sub">
      Platform Admin — manage restaurant tenants
    </p>

    <div class="form-error" id="formError"></div>

    <form id="loginForm">

      <div class="field">
        <label>Username</label>
        <input
          type="text"
          id="username"
          autocomplete="username"
          required
        />
      </div>

      <div class="field">
        <label>Password</label>
        <input
          type="password"
          id="password"
          autocomplete="current-password"
          required
        />
      </div>

      <button
        type="submit"
        class="btn btn-orange btn-full"
        id="submitBtn">
        Log In
      </button>

    </form>

    <hr style="margin:20px 0;opacity:.2">

    <h3>Debug Output</h3>

    <div id="debugPanel" style="
      background:#111;
      color:#00ff66;
      padding:12px;
      border-radius:8px;
      font-family:monospace;
      font-size:12px;
      white-space:pre-wrap;
      word-break:break-word;
      max-height:350px;
      overflow:auto;
      text-align:left;
    "></div>

  </div>
</div>

<script src="/super-admin/js/super-admin-api.js"></script>
<script src="/super-admin/js/login.js"></script>  
</body>
</html>
