<!DOCTYPE html>
<html lang="en">
<head>
<script>(function(){try{var t=localStorage.getItem('bitespot_theme')||'dark';document.documentElement.setAttribute('data-theme',t);}catch(e){}})();</script>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Platform Admin Login</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,600;1,9..144,500&family=Manrope:wght@400;500;600;700;800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/admin/css/admin.css" />
</head>
<body>
<div class="auth-wrap">
  <div class="auth-card">
    <div class="auth-logo">Bite<span class="accent">Spot</span></div>
    <p class="auth-sub">Platform Admin — manage restaurant tenants</p>

    <div class="form-error" id="formError"></div>

    <form id="loginForm">
      <div class="field">
        <label>Username</label>
        <input type="text" id="username" autocomplete="username" required />
      </div>
      <div class="field">
        <label>Password</label>
        <input type="password" id="password" autocomplete="current-password" required />
      </div>
      <button type="submit" class="btn btn-orange btn-full" id="submitBtn">Log In</button>
    </form>
  </div>
</div>

<script src="/super-admin/js/super-admin-api.js"></script>
<script>
  document.getElementById('loginForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const errorBox = document.getElementById('formError');
    const btn = document.getElementById('submitBtn');
    errorBox.classList.remove('show');
    btn.disabled = true;
    btn.textContent = 'Logging in...';

    try {
      await SuperAdminApi.login({
        username: document.getElementById('username').value.trim(),
        password: document.getElementById('password').value
      });
      location.href = '/super-admin/dashboard.html';
    } catch (err) {
      errorBox.textContent = err.message;
      errorBox.classList.add('show');
      btn.disabled = false;
      btn.textContent = 'Log In';
    }
  });
</script>
<script src="/shared/theme-toggle.js"></script>
<script src="/shared/eruda.js"></script>
<script>
console.log(window.eruda);
console.log(typeof window.eruda);

if (window.eruda) {
    window.eruda.init();
}
</script>
</body>
</html>
