<!DOCTYPE html>
<html lang="en">
<head>
<script>
(function () {
  try {
    var t = localStorage.getItem('bitespot_theme') || 'dark';
    document.documentElement.setAttribute('data-theme', t);
  } catch (e) {}
})();
</script>

<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />

<title>Platform Admin Login</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,600;1,9..144,500&family=Manrope:wght@400;500;600;700;800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">

<link rel="stylesheet" href="../admin/css/admin.css" />
</head>

<body>

<div class="auth-wrap">
  <div class="auth-card">

    <div class="auth-logo">
      Bite<span class="accent">Spot</span>
    </div>

    <p class="auth-sub">
      Platform Admin — manage restaurant tenants
    </p>

    <div class="form-error" id="formError"></div>

    <form id="loginForm">

      <div class="field">
        <label>Username</label>
        <input
          type="text"
          id="username"
          autocomplete="username"
          required
        />
      </div>

      <div class="field">
        <label>Password</label>
        <input
          type="password"
          id="password"
          autocomplete="current-password"
          required
        />
      </div>

      <button
        type="submit"
        class="btn btn-orange btn-full"
        id="submitBtn">
        Log In
      </button>

    </form>

    <hr style="margin:20px 0;opacity:.2">

    <h3>Debug Output</h3>

    <div id="debugPanel" style="
      background:#111;
      color:#00ff66;
      padding:12px;
      border-radius:8px;
      font-family:monospace;
      font-size:12px;
      white-space:pre-wrap;
      word-break:break-word;
      max-height:350px;
      overflow:auto;
      text-align:left;
    "></div>

  </div>
</div>

<script src="/super-admin/js/super-admin-api.js"></script>

<script>

const debugPanel = document.getElementById("debugPanel");

function debug(...args) {

  const text = args.map(arg => {

    if (typeof arg === "string")
      return arg;

    try {
      return JSON.stringify(arg, null, 2);
    } catch {
      return String(arg);
    }

  }).join(" ");

  debugPanel.textContent += text + "\n\n";

  console.log(...args);
}

document.getElementById("loginForm").addEventListener("submit", async (e) => {

  e.preventDefault();

  debugPanel.textContent = "";

  const errorBox = document.getElementById("formError");
  const btn = document.getElementById("submitBtn");

  errorBox.classList.remove("show");

  btn.disabled = true;
  btn.textContent = "Logging in...";

  const body = {
    username: document.getElementById("username").value.trim(),
    password: document.getElementById("password").value
  };

  try {

    debug("========== LOGIN REQUEST ==========");
    debug("Request Body:");
    debug(body);

    const response = await fetch("/api/super-admin/login", {
      method: "POST",
      credentials: "include",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify(body)
    });

    debug("========== LOGIN RESPONSE ==========");

    debug("Status:", response.status);
    debug("Status Text:", response.statusText);
    debug("URL:", response.url);
    debug("Redirected:", response.redirected);

    debug("Response Headers:");

    for (const [key, value] of response.headers.entries()) {
      debug(key + ": " + value);
    }

    const text = await response.text();

    debug("Raw Response Body:");
    debug(text);

    let json = {};

    try {
      json = JSON.parse(text);
      debug("Parsed JSON:");
      debug(json);
    } catch {
      debug("Response is not valid JSON.");
    }

    debug("document.cookie:");
    debug(document.cookie || "(empty)");

    if (!response.ok) {
      throw new Error(json.message || "Login failed");
    }

    debug("");
    debug("========== TESTING /me ==========");

    const me = await fetch("/api/super-admin/me", {
      credentials: "include"
    });

    debug("/me Status:");
    debug(me.status);

    debug("/me Headers:");

    for (const [key, value] of me.headers.entries()) {
      debug(key + ": " + value);
    }

    const meText = await me.text();

    debug("/me Response:");
    debug(meText);

    debug("");
    debug("Waiting 5 seconds before redirect...");

    await new Promise(resolve => setTimeout(resolve, 5000));

    // location.href = "/super-admin/dashboard.html";
    debug("");
debug("Login flow complete.");
debug("Click the button below to continue.");

const button = document.createElement("button");
button.textContent = "Continue to Dashboard";
button.className = "btn btn-orange btn-full";
button.onclick = () => {
  location.href = "/super-admin/dashboard.html";
};

debugPanel.after(button);

  } catch (err) {

    debug("");
    debug("========== ERROR ==========");
    debug(err.message);
    debug(err.stack || "No stack available");

    errorBox.textContent = err.message;
    errorBox.classList.add("show");

    btn.disabled = false;
    btn.textContent = "Log In";
  }

});

</script>

<script src="/shared/theme-toggle.js"></script>

<script src="/shared/eruda.js"></script>

<script>

debug("========== ERUDA ==========");

debug("window.eruda:");
debug(window.eruda);

debug("typeof eruda:");
debug(typeof window.eruda);

if (window.eruda) {
  eruda.init();
  debug("Eruda initialized.");
} else {
  debug("Eruda NOT loaded.");
}

</script>

</body>
</html>
